# Alembic configuration for AskBot.
#
# The database URL is intentionally NOT hard-coded here. alembic/env.py resolves
# it at runtime from get_database_url() (the same helper the app uses), so
# `alembic` commands target SQLite locally and PostgreSQL in production —
# exactly like the running app — based on the DATABASE_URL environment variable.

[alembic]
script_location = alembic
prepend_sys_path = .
# sqlalchemy.url is left blank on purpose — env.py injects it from the
# environment (DATABASE_URL) so secrets never live in this file.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
